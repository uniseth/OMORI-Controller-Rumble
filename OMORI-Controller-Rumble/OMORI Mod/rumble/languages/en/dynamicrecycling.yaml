# =========================================================================================
# ** RECYCLE (DAY)
# =========================================================================================

message_0:
      faceset: MainCharacters_Faraway
      faceindex: 17
      text: "Recycling? I never took you for the type!"\kel

message_1:
      faceset: MainCharacters_Faraway
      faceindex: 12
      text: "I'd definitely recycle more, but uh..."\kel

message_2:
      faceset: MainCharacters_Faraway
      faceindex: 15
      text: "I can never remember what goes where! You've always been good at things like that \n[8]."\kel

message_3:
      faceset: MainCharacters_Faraway
      faceindex: 22
      text: "Wait, if we dump all this now, does that mean we're technically 'cleaning'?"\kel

message_4:
      faceset: MainCharacters_Faraway
      faceindex: 25
      text: "... Don't tell my mom about this \n[8]. She'll get ideas!"\kel

message_5:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: "Hey, do you think if I recycled enough Orange Joe cans and bottles, they'd give me a lifetime supply? It's worth a shot, right?"\kel

message_5:
      faceset: MainCharacters_Faraway
      faceindex: 17
      text: "Whoa, that's a lot of stuff! We could've built a fort with that! Oh well, into the bin it goes!"\kel

message_6:
      faceset: MainCharacters_Faraway
      faceindex: 13
      text: "Maybe they'd let me name a new flavor!? 'Kel-berry' has a nice ring to it, right \n[8]?"\kel

message_7:
      faceset: MainCharacters_Faraway
      faceindex: 24
      text: "It feels pretty good to help out, doesn't it? My hands are a little sticky now, but it's worth it!"\kel

message_8:
      faceset: MainCharacters_Faraway
      faceindex: 15
      text: "I wonder if HECTOR would like living in a cardboard fort? Actually, he'd probably just get lost in there."\kel

message_9:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: "You're really dedicated to this, \n[8]! I'm just here for the moral support... and to carry the heavy stuff!"\kel

message_10:
      faceset: MainCharacters_Faraway
      faceindex: 12
      text: "Imagine if everyone in Faraway Town did this! We'd have the shiniest town in the world!"\kel

message_11:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: "Alright, that’s most of it! Let's get going. I'm kinda hungry and I think I hear GINO's calling my name!"\kel

# =========================================================================================
# ** RECYCLE AFTER GRAVE
# =========================================================================================

message_12:
      faceset: MainCharacters_Faraway
      faceindex: 17
      text: "Y'know \n[8]... I can't believe I forgot to mention this."\kel

message_13:
      faceset: MainCharacters_Faraway
      faceindex: 18
      text: "After HERO got... well, better."\kel

message_14:
      faceset: MainCharacters_Faraway
      faceindex: 24
      text: "I noticed that he'd make an effort to recycle more, and it seemed to make him pretty happy too!"\kel

message_15:
      faceset: MainCharacters_Faraway
      faceindex: 15
      text: "Told me that it's 'the little things that count'... or something like that."\kel

message_16:
      faceset: MainCharacters_Faraway
      faceindex: 24
      text: "I guess what I'm trying to say is... it sorta reminds me of you, \n[8]."\kel

message_17:
      faceset: MainCharacters_Faraway
      faceindex: 18
      text: "Taking it slow, day-by-day... helping others out..."\kel

message_18:
      faceset: MainCharacters_Faraway
      faceindex: 20
      text: "Maybe it isn't my place to say... but..."\kel

message_19:
      faceset: MainCharacters_Faraway
      faceindex: 12
      text: "I think that MARI would be very proud of you \n[8]."\kel

message_20:
      faceset: MainCharacters_Faraway
      faceindex: 16
      text: "... Ah jeez, didn't mean to make this so 'somber' and whatnot."\kel

message_21:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: "Wheredja wanna go next, \n[8]?"\kel
